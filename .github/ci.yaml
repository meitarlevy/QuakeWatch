name: CI Pipeline

on:
  push:
    branches-ignore:
      - main

jobs:
  lint-and-build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install pylint

      - name: Run Pylint
        run: pylint app || true

      - name: Build Docker image
        run: docker build -t quakewatch-ci .