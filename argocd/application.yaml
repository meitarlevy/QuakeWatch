apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: quakewatch
  namespace: argocd
spec:
  project: default

  source:
    repoURL: https://github.com/YOUR_USERNAME/QuakeWatch.git
    targetRevision: main
    path: helm/quakewatch

  destination:
    server: https://kubernetes.default.svc
    namespace: class4

  syncPolicy:
    automated:
      prune: true
      selfHeal: true